<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- السطور التالية تمنع المتصفح من تخزين النسخة القديمة وتجبره يحمل الجديد فوراً -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبابنا 2000 | دليل إسنا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --royal: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%); --whatsapp: #25D366; --phone: #28a745; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #fcfcfc; margin: 0; padding-bottom: 90px; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--royal); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; color: white; transition: 0.8s; }
        .loading-row { display: flex; flex-direction: row-reverse; align-items: center; gap: 12px; margin-top: 20px; }
        .loader { border: 3px solid rgba(255, 255, 255, 0.2); border-top: 3px solid #ffffff; border-radius: 50%; width: 22px; height: 22px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { background: var(--royal); padding: 50px 20px 70px; text-align: center; color: white; border-radius: 0 0 30px 30px; }
        .search-area { margin: -30px auto 20px; width: 90%; max-width: 500px; }
        #searchInput { width: 100%; padding: 16px 20px; border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); outline: none; text-align: center; font-size: 16px; }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 18px 25px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #edf2f7; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .card-content { display: flex; flex-direction: column; text-align: right; }
        .card-name { font-size: 18px; color: #1a202c; font-weight: 700; }
        .card-job-sub { font-size: 14px; color: #3182ce; font-weight: 600; margin-top: 2px; }
        .card-btn { color: #2b6cb0; font-weight: bold; font-size: 14px; }

        #updateAlert { display: none; position: fixed; z-index: 6000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .update-box { background: white; width: 85%; max-width: 380px; padding: 30px 25px; border-radius: 25px; text-align: center; }
        
        #alertMessageContent { 
            margin: 15px 0; 
            color: #4a5568; 
            line-height: 1.8; 
            white-space: pre-wrap; 
            text-align: right; 
            font-size: 15px;
        }

        .modal { display: none; position: fixed; z-index: 4000; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; }
        .modal-profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #eee; }
        
        .m-row { display: flex; margin-bottom: 8px; font-size: 15px; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .m-label { color: #718096; min-width: 90px; text-align: right; }
        .m-value { color: #2d3748; font-weight: 700; flex: 1; text-align: right; }

        .contact-actions { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .icon-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .bg-phone { background-color: var(--phone); }
        .bg-whatsapp { background-color: var(--whatsapp); }

        .suggestion-fab { position: fixed; bottom: 85px; left: 20px; background: var(--royal); color: white; padding: 12px 18px; border-radius: 50px; cursor: pointer; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-weight: bold; display: flex; align-items: center; gap: 8px; flex-direction: row; }
        
        .btn-main { background: var(--royal); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .sugg-input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; border: 1px solid #eee; text-align: right; outline: none; }
        .main-footer { position: fixed; bottom: 0; width: 100%; background: white; text-align: center; padding: 15px; border-top: 1px solid #eee; font-size: 12px; color: #718096; }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="margin:0; font-size: 32px;">شبابنا 2000</h1>
    <div class="loading-row"><div class="loader"></div><p id="msg" style="margin:0;">جاري التحميل</p></div>
</div>

<div id="updateAlert">
    <div class="update-box">
        <h3 style="color: #1a365d; margin:0;">ما الجديد في أبليكيشن شبابنا 2000 📢</h3>
        <p id="alertMessageContent"></p>
        <button id="closeUpdateBtn" class="btn-main">موافق</button>
    </div>
</div>

<header>
    <h1>شبابنا 2000</h1>
    <p>دليل الخدمات المهنية لشباب مركز إسنا</p>
</header>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="ابحث بالاسم أو التخصص..." onkeyup="filter()">
</div>

<div class="container" id="list"></div>

<div class="suggestion-fab" onclick="openSugg()"><span>أرسل مقترح</span> <span>💡</span></div>

<footer class="main-footer">برمجة وتطوير <b>GNANOO TECH</b></footer>

<div id="suggModal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0;">اقتراح تطوير 💡</h3>
        <input type="text" id="suggName" class="sugg-input" placeholder="اسمك">
        <textarea id="suggMsg" class="sugg-input" rows="4" placeholder="اكتب مقترحك"></textarea>
        <button id="sendBtn" class="btn-main" onclick="sendSugg()">إرسال</button>
        <button onclick="closeSugg()" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">إلغاء</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div id="m_img_container"></div>
        <h2 id="m_name" style="color:#1a365d; margin:0;"></h2>
        <div id="m_details"></div>
        <div class="contact-actions">
            <a id="m_call" href="#" class="icon-btn bg-phone"><img src="https://img.icons8.com/material-rounded/32/ffffff/phone.png"></a>
            <a id="m_whatsapp" href="#" target="_blank" class="icon-btn bg-whatsapp"><img src="https://img.icons8.com/color/32/ffffff/whatsapp.png"></a>
        </div>
        <button onclick="closeM()" style="margin-top:20px; background:none; border:none; color:#a0aec0; cursor:pointer; font-weight:bold; width:100%;">إغلاق</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwQ8o7t6-W4plvwHOvJt0qkn2FxyHdSdXv-e6rLTBUInExCvJ7KSOBBqUBrfnk2io5mFw/exec";
    const defaultImg = "https://img.icons8.com/fluency/96/user-male-circle.png";

    async function loadData() {
        try {
            const response = await fetch(scriptURL, { redirect: 'follow' });
            const result = await response.json();
            
            if (result.updates) {
                const currentVersion = result.updates.version.toString();
                const lastSeenVersion = localStorage.getItem('lastUpdateSeen');
                
                if (lastSeenVersion !== currentVersion) {
                    document.getElementById('alertMessageContent').innerText = result.updates.message;
                    document.getElementById('updateAlert').style.display = 'flex';
                    
                    document.getElementById('closeUpdateBtn').onclick = () => {
                        localStorage.setItem('lastUpdateSeen', currentVersion);
                        document.getElementById('updateAlert').style.display = 'none';
                    };
                }
            }

            const listElement = document.getElementById('list');
            listElement.innerHTML = ''; 
            let techs = result.data || result; 
            
            techs.sort((a, b) => (a.Name || a['الاسم'] || "").toString().localeCompare((b.Name || b['الاسم'] || ""), 'ar'));

            techs.forEach(p => {
                const name = p.Name || p['الاسم'];
                if(!name) return;
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-search', `${name} ${p.Job || p['المهنة']}`.toLowerCase());
                card.onclick = () => showDetails(p);
                card.innerHTML = `
                    <div class="card-content">
                        <span class="card-name">${name}</span>
                        <span class="card-job-sub">${p.Job || p['المهنة'] || ''}</span>
                    </div>
                    <span class="card-btn">تفاصيل ◀</span>`;
                listElement.appendChild(card);
            });
            document.getElementById('splash').style.display = 'none';
        } catch (e) { 
            console.error(e);
            document.getElementById('msg').innerText = "خطأ في الاتصال بالسيرفر"; 
        }
    }

    function showDetails(p) {
        const img = p.Image || p['الصورة'] || defaultImg;
        document.getElementById('m_img_container').innerHTML = `<img src="${img}" class="modal-profile-img">`;
        document.getElementById('m_name').innerText = p.Name || p['الاسم'];
        document.getElementById('m_details').innerHTML = `
            <div class="m-row"><span class="m-label">اسم المحل:</span><span class="m-value">${p['Store Name'] || p['اسم المحل'] || '—'}</span></div>
            <div class="m-row"><span class="m-label">التخصص:</span><span class="m-value">${p.Job || p['المهنة'] || '—'}</span></div>
            <div class="m-row"><span class="m-label">العنوان:</span><span class="m-value">${p.Address || p['العنوان'] || 'إسنا'}</span></div>
        `;
        let phone = (p.Phone || p['الموبايل'] || "").toString().trim();
        document.getElementById('m_call').href = "tel:" + phone;
        document.getElementById('m_whatsapp').href = `https://wa.me/20${phone.replace(/^0/, '')}`;
        document.getElementById('modal').style.display = "block";
    }

    async function sendSugg() {
        const msg = document.getElementById('suggMsg').value;
        const uName = document.getElementById('suggName').value || "فاعل خير";
        if(!msg) return alert("اكتب مقترحك");
        const btn = document.getElementById('sendBtn');
        btn.innerText = "جاري الإرسال";
        btn.disabled = true;
        try {
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userName: uName, message: msg }) 
            });
            alert("تم الإرسال ❤️");
            closeSugg();
            document.getElementById('suggMsg').value = "";
        } catch (e) { alert("حدث خطأ أثناء الإرسال"); }
        finally { btn.innerText = "إرسال"; btn.disabled = false; }
    }

    function openSugg() { document.getElementById('suggModal').style.display = 'block'; }
    function closeSugg() { document.getElementById('suggModal').style.display = 'none'; }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function filter() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for(let c of cards) { c.style.display = c.getAttribute('data-search').includes(val) ? "flex" : "none"; }
    }
    loadData();
</script>
</body>
</html>
