<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبابنا 2000 | دليل إسنا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --royal: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%); --whatsapp: #25D366; --phone: #28a745; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #fcfcfc; margin: 0; padding-bottom: 90px; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--royal); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; transition: 0.8s; }
        .loading-row { display: flex; flex-direction: row-reverse; align-items: center; gap: 12px; margin-top: 20px; }
        .loader { border: 3px solid rgba(255, 255, 255, 0.2); border-top: 3px solid #ffffff; border-radius: 50%; width: 22px; height: 22px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { background: var(--royal); padding: 50px 20px 70px; text-align: center; color: white; border-radius: 0 0 30px 30px; }
        .search-area { margin: -30px auto 20px; width: 90%; max-width: 500px; }
        #searchInput { width: 100%; padding: 16px 20px; border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); outline: none; text-align: center; font-size: 16px; }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 18px 25px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #edf2f7; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .card:active { transform: scale(0.97); background: #f8fafc; }
        .card-name { font-size: 18px; color: #1a202c; font-weight: 700; }

        .modal { display: none; position: fixed; z-index: 2000; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 15% auto; padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .m-header { border-bottom: 2px solid #f0f4f8; margin-bottom: 15px; padding-bottom: 10px; }
        .m-row { display: flex; margin-bottom: 8px; font-size: 15px; padding-bottom: 6px; border-bottom: 1px solid #f9f9f9; }
        .m-label { color: #718096; min-width: 105px; text-align: right; }
        .m-value { color: #2d3748; font-weight: 700; flex: 1; text-align: right; }

        .contact-actions { display: flex; justify-content: center; gap: 30px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .icon-btn { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.3s; }
        .icon-btn img { width: 32px; height: 32px; }
        .bg-phone { background-color: var(--phone); box-shadow: 0 4px 12px rgba(40,167,69,0.3); }
        .bg-whatsapp { background-color: var(--whatsapp); box-shadow: 0 4px 12px rgba(37,211,102,0.3); }
        .icon-btn:active { transform: scale(0.9); }

        .main-footer { position: fixed; bottom: 0; width: 100%; background: white; text-align: center; padding: 15px; border-top: 1px solid #eee; font-size: 13px; z-index: 100; color: #4a5568; }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="margin:0; font-size: 32px;">شبابنا 2000</h1>
    <div class="loading-row">
        <div class="loader"></div>
        <p id="msg" style="margin:0; font-size: 16px;">جاري التحميل...</p>
    </div>
    <div style="position:absolute; bottom:30px; opacity:0.7;">مدعوم بواسطة GNANOO TECH</div>
</div>

<header>
    <h1>شبابنا 2000</h1>
    <p>دليل الخدمات المهنية لشباب مركز إسنا</p>
</header>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="ابحث بالاسم أو التخصص..." onkeyup="filter()">
</div>

<div class="container" id="list"></div>

<footer class="main-footer">مدعوم بواسطة <b>GNANOO TECH</b></footer>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="m-header"><h2 id="m_name" style="color:#1a365d; margin:0;"></h2></div>
        <div id="m_details"></div>
        
        <div class="contact-actions">
            <a id="m_call" href="#" class="icon-btn bg-phone">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png" alt="اتصال">
            </a>
            <a id="m_whatsapp" href="#" target="_blank" class="icon-btn bg-whatsapp">
                <img src="https://img.icons8.com/color/48/ffffff/whatsapp--v1.png" alt="واتساب">
            </a>
        </div>
        
        <button onclick="closeM()" style="width:100%; border:none; background:none; margin-top:25px; color:#a0aec0; cursor:pointer;">إغلاق</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbx0OOVmJzIfuKVU8w5QKtFaJLf2q_QVTT2MlCBCyb-m6E4pJrw94Wf_qEDFVPmJvPY/exec";

    async function loadData() {
        try {
            const response = await fetch(scriptURL);
            let data = await response.json();
            
            data.sort((a, b) => {
                let nameA = (a.Name || a['الاسم'] || "").toString();
                let nameB = (b.Name || b['الاسم'] || "").toString();
                return nameA.localeCompare(nameB, 'ar');
            });

            const listElement = document.getElementById('list');
            listElement.innerHTML = ''; 

            data.forEach(p => {
                const name = p.Name || p['الاسم'];
                if(!name) return;
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-search', `${name} ${p.Job || p['المهنة']} ${p['Store Name'] || p['اسم المحل']}`.toLowerCase());
                card.onclick = () => showDetails(p);
                card.innerHTML = `<span class="card-name">${name}</span><span style="color:#3182ce; font-size:12px;">تفاصيل ◀</span>`;
                listElement.appendChild(card);
            });
            
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
            
        } catch (e) { 
            document.getElementById('msg').innerText = "حدث خطأ في الاتصال";
        }
    }

    function showDetails(p) {
        const name = p.Name || p['الاسم'];
        let rawPhone = (p.Phone || p['الموبايل'] || p['الهاتف'] || "").toString().trim();
        
        let cleanPhone = rawPhone;
        if (cleanPhone.startsWith('0')) {
            cleanPhone = cleanPhone.substring(1);
        }

        document.getElementById('m_name').innerText = name;
        document.getElementById('m_details').innerHTML = `
            <div class="m-row"><span class="m-label">اسم المحل:</span><span class="m-value">${p['Store Name'] || p['اسم المحل'] || '—'}</span></div>
            <div class="m-row"><span class="m-label">التخصص:</span><span class="m-value">${p.Job || p['المهنة'] || 'فني'}</span></div>
            <div class="m-row"><span class="m-label">العنوان:</span><span class="m-value">${p.Address || p['العنوان'] || 'إسنا'}</span></div>
            <div class="m-row"><span class="m-label">الالرقم القومي:</span><span class="m-value" style="direction:ltr; text-align:right;">${p.NationalID || p['الرقم القومي'] || '---'}</span></div>
        `;

        document.getElementById('m_call').href = "tel:" + rawPhone;
        document.getElementById('m_whatsapp').href = `https://wa.me/20${cleanPhone}`;
        
        document.getElementById('modal').style.display = "block";
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target == document.getElementById('modal')) closeM(); }

    function filter() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for(let c of cards) {
            c.style.display = c.getAttribute('data-search').includes(val) ? "flex" : "none";
        }
    }
    loadData();
</script>
</body>
</html>
